<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dr. Shivanka Rajapakshe</title>
    <script>
      // GitHub Pages SPA redirect
      var segment = 1;
      var location = window.location;
      location.replace(
        location.protocol +
          '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          location.pathname
            .split('/')
            .slice(0, 1 + segment)
            .join('/') +
          '/?p=/' +
          location.pathname.slice(1).split('/').slice(segment).join('/').replace(/&/g, '~and~') +
          (location.search ? '&q=' + location.search.slice(1).replace(/&/g, '~and~') : '') +
          location.hash
      );
    </script>
  </head>
  <body></body>
</html>
